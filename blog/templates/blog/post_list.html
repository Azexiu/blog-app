{% extends 'base.html' %}

{% block title %}
    Lista de Posts
{% endblock %}

{% block content %}

<h1>Listado de Posts</h1>

<p>
    <a href="{% url 'post_create' %}">
        Crear nuevo post
    </a>
</p>

<ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'post_detail' post.pk %}">
                {{ post.title }}
            </a>

        </li>
    {% endfor %}
</ul>

{% endblock %}
